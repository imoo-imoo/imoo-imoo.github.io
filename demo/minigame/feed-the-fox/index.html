<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#54d4cb" />
    <title>Feed the Fox</title>
    <link rel="stylesheet" href="styles.css?v=ui-repair-6" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sigmar&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Agbalumo&display=swap" rel="stylesheet">
  </head>
  <body>
    <main class="shell" aria-label="Feed the Fox game">
      <canvas id="game" width="1080" height="1920"></canvas>
      <audio id="bgm" src="assets/music/be-happy-35.mp3" preload="auto"></audio>

      <section id="home" class="screen screen--active">
        <div class="logo" aria-label="Feed the Fox">
          <span>Feed the</span>
          <strong>FOX</strong>
        </div>
        <button id="startButton" class="wood-button primary">Play</button>
        <button id="leaderButton" class="wood-button">Leaderboard</button>
      </section>

      <section id="leaderboard" class="screen">
        <div class="panel">
          <h1>Leaderboard</h1>
          <ol id="leaderList" class="scores"></ol>
          <button class="wood-button small" data-home>Home</button>
        </div>
      </section>

      <section id="gameHud" class="hud" aria-live="polite">
        <div class="badge score-badge">
          <span>Score</span>
          <strong id="scoreText">000</strong>
        </div>
        <div class="badge time-badge">
          <span>Time</span>
          <strong id="timeText">30</strong>
        </div>
      </section>

      <section id="controls" class="controls" aria-label="Fox controls">
        <button id="leftButton" class="control-button" aria-label="Move left">‹</button>
        <button id="rightButton" class="control-button" aria-label="Move right">›</button>
      </section>

      <section id="gameOver" class="screen">
        <div class="panel result">
          <h1>Time Up!</h1>
          <p id="finalScore">Score 0</p>
          <label class="name-field">
            <span>Name</span>
            <input id="nameInput" type="text" maxlength="5" autocomplete="off" inputmode="latin" value="FOX" />
          </label>
          <button id="saveScoreButton" class="wood-button primary small">Save Score</button>
          <button id="playAgainButton" class="wood-button small">Play Again</button>
          <button class="wood-button small" data-home>Home</button>
        </div>
      </section>
    </main>

    <script src="game.js?v=ui-repair-6"></script>
  </body>
</html>
