<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#77cdee" />
    <title>Feed the Fox</title>
    <link rel="stylesheet" href="styles.css?v=final-ui-fix-1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sigmar&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Agbalumo&display=swap" rel="stylesheet">
  </head>
  <body>
    <main class="shell" aria-label="Feed the Fox game">
      <canvas id="game" width="1080" height="1920" draggable="false"></canvas>
      <audio id="bgm" src="assets/music/be-happy-35.mp3" preload="auto"></audio>

      <section id="home" class="screen screen--active">
        <div class="logo" aria-label="Feed the Fox">
          <span>Feed the</span>
          <strong>FOX</strong>
        </div>
        <button id="startButton" type="button" class="wood-button primary">Play</button>
        <button id="leaderButton" type="button" class="wood-button">Leaderboard</button>
      </section>

      <section id="leaderboard" class="screen">
        <div class="panel">
          <h1>Leaderboard</h1>
          <ol id="leaderList" class="scores"></ol>
          <div class="leader-actions">
            <button id="playFromLeaderboardButton" type="button" class="wood-button primary small leader-button">Play Again</button>
            <button id="homeLeaderboardButton" type="button" class="wood-button small leader-button">Home</button>
          </div>
        </div>
      </section>

      <section id="gameHud" class="hud" aria-live="polite">
        <div class="badge score-badge">
          <span>Score</span>
          <strong id="scoreText">000</strong>
        </div>
        <div class="badge time-badge">
          <span>Time</span>
          <strong id="timeText">30</strong>
        </div>
      </section>

      <section id="controls" class="controls" aria-label="Fox controls">
        <button id="leftButton" type="button" class="control-button" aria-label="Move left" draggable="false">‹</button>
        <button id="rightButton" type="button" class="control-button" aria-label="Move right" draggable="false">›</button>
      </section>

      <section id="gameOver" class="screen">
        <div class="panel result">
          <div id="resultSummary" class="result-view result-view--summary">
            <h1 class="result-heading">Time Up!</h1>
            <div class="final-score-block" aria-live="polite">
              <span class="final-score-label">Score</span>
              <strong id="finalScore" class="final-score-value">000</strong>
            </div>
            <div class="result-stats">
              <p id="performanceTitle" class="performance-title">E-WASTE BEGINNER</p>
              <p id="bestCombo" class="best-combo">Best Combo ×0</p>
            </div>
            <div class="result-actions">
              <button id="saveScoreButton" type="button" class="wood-button primary small result-button">Save Score</button>
              <button id="homeResultButton" type="button" class="wood-button small result-home-button">Home</button>
            </div>
          </div>

          <div id="resultNameEntry" class="result-view result-view--name-entry" aria-hidden="true">
            <h1 class="name-entry-title">Save Your Score</h1>
            <div class="name-entry-form">
              <label class="name-field">
                <span>Name</span>
                <input id="nameInput" type="text" maxlength="5" autocomplete="off" inputmode="latin" value="FOX" />
              </label>
              <div class="result-actions name-actions">
                <button id="confirmScoreButton" type="button" class="wood-button primary small result-button">Confirm</button>
                <button id="backResultButton" type="button" class="wood-button small result-button">Back</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="game.js?v=final-ui-fix-1"></script>
  </body>
</html>
